<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер рулонов ткани</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <?!= include('css'); ?>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <button class="back-btn" id="back-btn" style="display:none">←</button>
      <h1 id="page-title">Сканер рулонов ткани</h1>
      <button class="sync-btn" id="sync-btn">🔄</button>
    </header>

    <!-- Scanner Page -->
    <div id="scanner-page" class="page active">
      <div class="main-content">
        <div class="scan-section">
          <button class="btn btn-primary btn-large" id="scan-btn">
            📷 Сканировать QR-код
          </button>
          
          <div class="divider"><span>или</span></div>
          
          <div class="manual-input">
            <input type="text" class="input" id="manual-code" placeholder="Введите код (например 2020_1)">
            <button class="btn btn-primary" id="manual-submit">OK</button>
          </div>
        </div>

        <div class="recent-scans">
          <h3>Последние сканирования</h3>
          <div class="recent-list" id="recent-list">
            <p class="empty-state">Пока нет сканирований</p>
          </div>
        </div>

        <button class="btn btn-outline" id="view-orders-btn" style="width:100%">
          📋 Список заказов
        </button>
      </div>
    </div>

    <!-- Orders List Page -->
    <div id="orders-page" class="page">
      <div class="main-content">
        <div class="search-bar">
          <input type="text" class="input" id="order-search" placeholder="Поиск заказа...">
        </div>
        
        <div class="orders-list" id="orders-list">
          <p class="empty-state">Загрузка...</p>
        </div>

        <button class="btn btn-primary" id="add-order-btn" style="width:100%">
          + Новый заказ
        </button>
      </div>
    </div>

    <!-- Order Detail Page -->
    <div id="order-detail-page" class="page">
      <div class="main-content">
        <div class="order-summary">
          <div class="summary-card">
            <span class="summary-label">Заказ</span>
            <span class="summary-value" id="detail-order-id">-</span>
          </div>
          <div class="summary-card">
            <span class="summary-label">Прогресс</span>
            <span class="summary-value" id="detail-progress">-</span>
          </div>
        </div>

        <div class="order-status" id="detail-status">Ожидает</div>

        <div class="rolls-table-container">
          <table class="rolls-table">
            <thead>
              <tr>
                <th>Рулон</th>
                <th>Завод</th>
                <th>Факт</th>
                <th>Усадка</th>
                <th>Статус</th>
              </tr>
            </thead>
            <tbody id="rolls-table-body">
            </tbody>
          </table>
        </div>

        <button class="btn btn-secondary" id="add-roll-btn" style="width:100%">
          + Добавить рулон
        </button>
      </div>
    </div>

    <!-- Scanner Modal -->
    <div id="scanner-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Сканирование</h3>
          <button class="close-btn" id="close-scanner">✕</button>
        </div>
        <div id="qr-reader"></div>
      </div>
    </div>

    <!-- Record Modal -->
    <div id="record-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Запись данных</h3>
          <button class="close-btn" id="close-record">✕</button>
        </div>
        <form id="record-form">
          <div class="form-group">
            <label>Заказ</label>
            <div class="form-value" id="record-order-id">-</div>
          </div>
          <div class="form-group">
            <label>Рулон №</label>
            <div class="form-value" id="record-roll-number">-</div>
          </div>
          <div class="form-group">
            <label>Заводской метраж (м)</label>
            <input type="number" class="input" id="factory-length" step="0.1" required>
          </div>
          <div class="form-group">
            <label>Измеренный метраж (м)</label>
            <input type="number" class="input" id="measured-length" step="0.1">
          </div>
          <div class="form-group">
            <label>Усадка (%)</label>
            <input type="number" class="input" id="shrinkage" step="0.1">
          </div>
          <div class="action-buttons">
            <button type="submit" class="btn btn-primary">Записать</button>
            <button type="button" class="btn btn-outline" id="save-partial">Частично</button>
          </div>
        </form>
      </div>
    </div>

    <!-- New Order Modal -->
    <div id="new-order-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Новый заказ</h3>
          <button class="close-btn" id="close-new-order">✕</button>
        </div>
        <form id="new-order-form">
          <div class="form-group">
            <label>Номер заказа</label>
            <input type="text" class="input" id="new-order-id" required>
          </div>
          <div class="form-group">
            <label>Количество рулонов</label>
            <input type="number" class="input" id="new-order-rolls" min="1" value="5" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Создать</button>
        </form>
      </div>
    </div>

    <!-- Add Roll Modal -->
    <div id="add-roll-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Добавить рулон</h3>
          <button class="close-btn" id="close-add-roll">✕</button>
        </div>
        <form id="add-roll-form">
          <div class="form-group">
            <label>Номер рулона</label>
            <input type="number" class="input" id="new-roll-number" min="1" required>
          </div>
          <div class="form-group">
            <label>Заводской метраж (м)</label>
            <input type="number" class="input" id="new-roll-factory-length" step="0.1" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Добавить</button>
        </form>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>
  </div>

  <script>
    // ===== State =====
    let orders = {};
    let recentScans = [];
    let currentOrderId = null;
    let currentRollNumber = null;
    let html5QrcodeScanner = null;

    // ===== Initialization =====
    document.addEventListener('DOMContentLoaded', async () => {
      initializeEventListeners();
      await loadData();
      renderRecentScans();
      renderOrdersList();
    });

    // ===== API Functions =====
    async function loadData() {
      try {
        const response = await google.script.run.withSuccessHandler(handleOrdersLoaded).getOrders();
      } catch (error) {
        console.error('Error loading data:', error);
        showToast('Ошибка загрузки данных', 'error');
      }
    }

    function handleOrdersLoaded(data) {
      if (data.orders) {
        orders = {};
        data.orders.forEach(order => {
          orders[order.id] = order;
        });
      }
      renderOrdersList();
    }

    async function saveRollToSheet(orderId, rollNumber, factoryLength, measuredLength, shrinkage, status) {
      try {
        await google.script.run.saveRoll({
          orderId, rollNumber, factoryLength, measuredLength, shrinkage, status
        });
        return true;
      } catch (error) {
        console.error('Error saving:', error);
        showToast('Ошибка сохранения', 'error');
        return false;
      }
    }

    async function createOrderInSheet(orderId, totalRolls, rolls) {
      try {
        await google.script.run.createOrder({ orderId, totalRolls, rolls });
        return true;
      } catch (error) {
        console.error('Error creating order:', error);
        showToast('Ошибка создания заказа', 'error');
        return false;
      }
    }

    // ===== Event Listeners =====
    function initializeEventListeners() {
      document.getElementById('scan-btn').addEventListener('click', openScanner);
      document.getElementById('manual-submit').addEventListener('click', handleManualInput);
      document.getElementById('manual-code').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleManualInput();
      });
      
      document.getElementById('view-orders-btn').addEventListener('click', () => showPage('orders-page'));
      document.getElementById('back-btn').addEventListener('click', goBack);
      
      document.getElementById('close-scanner').addEventListener('click', closeScanner);
      document.getElementById('close-record').addEventListener('click', closeRecordModal);
      document.getElementById('record-form').addEventListener('submit', handleRecordSubmit);
      document.getElementById('save-partial').addEventListener('click', handlePartialSave);
      
      document.getElementById('add-order-btn').addEventListener('click', () => {
        document.getElementById('new-order-modal').classList.add('active');
      });
      document.getElementById('close-new-order').addEventListener('click', () => {
        document.getElementById('new-order-modal').classList.remove('active');
      });
      document.getElementById('new-order-form').addEventListener('submit', handleNewOrderSubmit);
      
      document.getElementById('add-roll-btn').addEventListener('click', () => {
        document.getElementById('add-roll-modal').classList.add('active');
      });
      document.getElementById('close-add-roll').addEventListener('click', () => {
        document.getElementById('add-roll-modal').classList.remove('active');
      });
      document.getElementById('add-roll-form').addEventListener('submit', handleAddRoll);
      
      document.getElementById('order-search').addEventListener('input', (e) => {
        renderOrdersList(e.target.value);
      });
      
      document.getElementById('sync-btn').addEventListener('click', async () => {
        showToast('Синхронизация...', 'info');
        await loadData();
        showToast('Данные обновлены', 'success');
      });
    }

    // ===== Navigation =====
    const pageHistory = ['scanner-page'];

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      
      const backBtn = document.getElementById('back-btn');
      backBtn.style.display = pageId !== 'scanner-page' ? 'block' : 'none';
      
      const titles = {
        'scanner-page': 'Сканер рулонов ткани',
        'orders-page': 'Список заказов',
        'order-detail-page': 'Заказ ' + (currentOrderId || '')
      };
      document.getElementById('page-title').textContent = titles[pageId] || 'Сканер';
      
      if (!pageHistory.includes(pageId)) {
        pageHistory.push(pageId);
      }
      
      if (pageId === 'orders-page') {
        renderOrdersList();
      }
    }

    function goBack() {
      if (pageHistory.length > 1) {
        pageHistory.pop();
        showPage(pageHistory[pageHistory.length - 1]);
      }
    }

    // ===== Scanner =====
    function openScanner() {
      document.getElementById('scanner-modal').classList.add('active');
      
      if (!html5QrcodeScanner) {
        html5QrcodeScanner = new Html5QrcodeScanner(
          'qr-reader', { fps: 10, qrbox: { width: 250, height: 250 } }, false
        );
      }
      
      html5QrcodeScanner.render(handleQRCodeScan, (error) => console.log(error));
    }

    function closeScanner() {
      document.getElementById('scanner-modal').classList.remove('active');
      if (html5QrcodeScanner) {
        html5QrcodeScanner.clear().catch(err => console.log(err));
      }
    }

    function handleQRCodeScan(decodedText) {
      closeScanner();
      processScannedCode(decodedText);
    }

    function handleManualInput() {
      const code = document.getElementById('manual-code').value.trim();
      if (code) {
        processScannedCode(code);
        document.getElementById('manual-code').value = '';
      }
    }

    async function processScannedCode(code) {
      const parts = code.split('_');
      if (parts.length !== 2) {
        showToast('Неверный формат. Используйте: ЗАКАЗ_РУЛОН', 'error');
        return;
      }
      
      const orderId = parts[0];
      const rollNumber = parseInt(parts[1]);
      
      if (isNaN(rollNumber)) {
        showToast('Неверный номер рулона', 'error');
        return;
      }
      
      addToRecentScans(code);
      
      // Reload to get latest data
      await loadData();
      
      if (!orders[orderId]) {
        const totalRolls = prompt('Заказ не найден. Введите количество рулонов:', '5');
        if (!totalRolls) return;
        
        await createOrder(orderId, parseInt(totalRolls), rollNumber);
      }
      
      openRecordModal(orderId, rollNumber);
    }

    // ===== Recent Scans =====
    function addToRecentScans(code) {
      const timestamp = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      recentScans = recentScans.filter(s => s.code !== code);
      recentScans.unshift({ code, timestamp });
      recentScans = recentScans.slice(0, 5);
      renderRecentScans();
    }

    function renderRecentScans() {
      const container = document.getElementById('recent-list');
      if (recentScans.length === 0) {
        container.innerHTML = '<p class="empty-state">Пока нет сканирований</p>';
        return;
      }
      
      container.innerHTML = recentScans.map(scan => `
        <div class="recent-item" data-code="${scan.code}">
          <span class="recent-code">${scan.code}</span>
          <span class="recent-time">${scan.timestamp}</span>
        </div>
      `).join('');
      
      container.querySelectorAll('.recent-item').forEach(item => {
        item.addEventListener('click', () => processScannedCode(item.dataset.code));
      });
    }

    // ===== Orders List =====
    function renderOrdersList(filter = '') {
      const container = document.getElementById('orders-list');
      const filtered = Object.values(orders).filter(o => o.id.includes(filter));
      
      if (filtered.length === 0) {
        container.innerHTML = '<p class="empty-state">Заказов не найдено</p>';
        return;
      }
      
      container.innerHTML = filtered.map(order => {
        const completed = order.rolls.filter(r => r.status === 'completed').length;
        const progress = (completed / order.totalRolls) * 100;
        const statusClass = order.status === 'completed' ? 'completed' : 
                           order.status === 'in-progress' ? 'in-progress' : 'pending';
        const statusText = order.status === 'completed' ? 'Завершён' : 
                          order.status === 'in-progress' ? 'В работе' : 'Ожидает';
        
        return `
          <div class="order-card" data-order-id="${order.id}">
            <div class="order-header">
              <span class="order-id">Заказ ${order.id}</span>
              <span class="order-status ${statusClass}">${statusText}</span>
            </div>
            <div class="order-progress-bar">
              <div class="order-progress-fill" style="width: ${progress}%"></div>
            </div>
            <div class="order-progress">${completed} / ${order.totalRolls} рулонов</div>
          </div>
        `;
      }).join('');
      
      container.querySelectorAll('.order-card').forEach(card => {
        card.addEventListener('click', () => {
          currentOrderId = card.dataset.orderId;
          showPage('order-detail-page');
          renderOrderDetail(currentOrderId);
        });
      });
    }

    // ===== Order Detail =====
    function renderOrderDetail(orderId) {
      const order = orders[orderId];
      if (!order) return;
      
      document.getElementById('detail-order-id').textContent = orderId;
      
      const completed = order.rolls.filter(r => r.status === 'completed').length;
      const progress = Math.round((completed / order.totalRolls) * 100);
      document.getElementById('detail-progress').textContent = `${completed}/${order.totalRolls} (${progress}%)`;
      
      const statusEl = document.getElementById('detail-status');
      statusEl.className = 'order-status ' + order.status;
      statusEl.textContent = order.status === 'completed' ? 'Завершён' : 
                            order.status === 'in-progress' ? 'В работе' : 'Ожидает';
      
      const tbody = document.getElementById('rolls-table-body');
      tbody.innerHTML = order.rolls.map(roll => {
        const statusBadge = roll.status === 'completed' ? 'Готов' : 
                           roll.status === 'partial' ? 'Частично' : 'Ожидает';
        const statusClass = roll.status === 'completed' ? 'status-completed' : 
                          roll.status === 'partial' ? 'status-partial' : 'status-pending';
        
        return `
          <tr data-roll="${roll.rollNumber}">
            <td class="roll-roll-number">${roll.rollNumber}</td>
            <td>${roll.factoryLength || '-'}</td>
            <td>${roll.measuredLength || '-'}</td>
            <td>${roll.shrinkage !== null ? roll.shrinkage + '%' : '-'}</td>
            <td><span class="status-badge ${statusClass}">${statusBadge}</span></td>
          </tr>
        `;
      }).join('');
      
      tbody.querySelectorAll('tr').forEach(row => {
        row.addEventListener('click', () => {
          openRecordModal(orderId, parseInt(row.dataset.roll));
        });
      });
    }

    // ===== Record Modal =====
    function openRecordModal(orderId, rollNumber) {
      currentOrderId = orderId;
      currentRollNumber = rollNumber;
      
      const order = orders[orderId];
      let roll = order.rolls.find(r => r.rollNumber === rollNumber);
      
      if (!roll) {
        roll = { rollNumber, factoryLength: null, measuredLength: null, shrinkage: null, status: 'pending' };
        order.rolls.push(roll);
      }
      
      document.getElementById('record-order-id').textContent = orderId;
      document.getElementById('record-roll-number').textContent = rollNumber;
      document.getElementById('factory-length').value = roll.factoryLength || '';
      document.getElementById('measured-length').value = roll.measuredLength || '';
      document.getElementById('shrinkage').value = roll.shrinkage || '';
      
      document.getElementById('record-modal').classList.add('active');
    }

    function closeRecordModal() {
      document.getElementById('record-modal').classList.remove('active');
      currentOrderId = null;
      currentRollNumber = null;
    }

    async function handleRecordSubmit(e) {
      e.preventDefault();
      await saveRollData(true);
    }

    async function handlePartialSave() {
      await saveRollData(false);
    }

    async function saveRollData(complete) {
      const factoryLength = parseFloat(document.getElementById('factory-length').value);
      const measuredLength = parseFloat(document.getElementById('measured-length').value) || null;
      const shrinkage = parseFloat(document.getElementById('shrinkage').value) || null;
      
      if (isNaN(factoryLength)) {
        showToast('Введите заводской метраж', 'error');
        return;
      }
      
      const order = orders[currentOrderId];
      let roll = order.rolls.find(r => r.rollNumber === currentRollNumber);
      
      if (!roll) {
        roll = { rollNumber: currentRollNumber, factoryLength, measuredLength: null, shrinkage: null, status: 'pending' };
        order.rolls.push(roll);
      }
      
      roll.factoryLength = factoryLength;
      
      if (measuredLength !== null && shrinkage !== null) {
        roll.measuredLength = measuredLength;
        roll.shrinkage = shrinkage;
        roll.status = 'completed';
      } else if (measuredLength !== null || shrinkage !== null) {
        roll.measuredLength = measuredLength;
        roll.shrinkage = shrinkage;
        roll.status = 'partial';
      } else {
        roll.status = 'pending';
      }
      
      // Update order status
      const completed = order.rolls.filter(r => r.status === 'completed').length;
      if (completed === order.totalRolls) order.status = 'completed';
      else if (completed > 0) order.status = 'in-progress';
      else order.status = 'pending';
      
      // Save to sheet
      const saved = await saveRollToSheet(
        currentOrderId, currentRollNumber, roll.factoryLength, 
        roll.measuredLength, roll.shrinkage, roll.status
      );
      
      closeRecordModal();
      
      if (saved) {
        showToast('Сохранено в Google Таблицу', 'success');
      } else {
        showToast('Сохранено локально', 'warning');
      }
      
      renderOrderDetail(currentOrderId);
      renderOrdersList();
    }

    // ===== New Order =====
    async function createOrder(orderId, totalRolls, firstRollNumber = 1) {
      const rolls = [];
      for (let i = 1; i <= totalRolls; i++) {
        rolls.push({
          rollNumber: i,
          factoryLength: null,
          measuredLength: null,
          shrinkage: null,
          status: 'pending'
        });
      }
      
      orders[orderId] = { id: orderId, totalRolls, rolls, status: 'pending' };
      
      await createOrderInSheet(orderId, totalRolls, rolls);
      renderOrdersList();
    }

    async function handleNewOrderSubmit(e) {
      e.preventDefault();
      
      const orderId = document.getElementById('new-order-id').value.trim();
      const totalRolls = parseInt(document.getElementById('new-order-rolls').value);
      
      if (!orderId || isNaN(totalRolls)) {
        showToast('Заполните все поля', 'error');
        return;
      }
      
      if (orders[orderId]) {
        showToast('Заказ уже существует', 'error');
        return;
      }
      
      await createOrder(orderId, totalRolls);
      
      document.getElementById('new-order-modal').classList.remove('active');
      document.getElementById('new-order-form').reset();
      showPage('orders-page');
      showToast('Заказ создан', 'success');
    }

    // ===== Add Roll =====
    async function handleAddRoll(e) {
      e.preventDefault();
      
      const rollNumber = parseInt(document.getElementById('new-roll-number').value);
      const factoryLength = parseFloat(document.getElementById('new-roll-factory-length').value);
      
      if (!currentOrderId || isNaN(rollNumber) || isNaN(factoryLength)) {
        showToast('Заполните все поля', 'error');
        return;
      }
      
      const order = orders[currentOrderId];
      
      if (order.rolls.find(r => r.rollNumber === rollNumber)) {
        showToast('Рулон уже существует', 'error');
        return;
      }
      
      order.rolls.push({
        rollNumber,
        factoryLength,
        measuredLength: null,
        shrinkage: null,
        status: 'pending'
      });
      
      order.totalRolls = Math.max(order.totalRolls, rollNumber);
      
      await saveRollToSheet(currentOrderId, rollNumber, factoryLength, null, null, 'pending');
      
      renderOrderDetail(currentOrderId);
      document.getElementById('add-roll-modal').classList.remove('active');
      document.getElementById('add-roll-form').reset();
      showToast('Рулон добавлен', 'success');
    }

    // ===== Toast =====
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.textContent = message;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('toast-show'), 10);
      setTimeout(() => {
        toast.classList.remove('toast-show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
  </script>
</body>
</html>
